<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sén Péi — fiche</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --terre:#1A0E08; --terre2:#27150D; --panel:#33200f;
    --safran:#F6BE54; --brique:#D2602F; --corail:#FF7A47;
    --creme:#F8EFE1; --muet:#C6AC95; --ligne:rgba(255,233,210,.13);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--creme);background:var(--terre);-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .wrap{max-width:760px;margin:0 auto;padding:0 24px}
  header{display:flex;align-items:center;justify-content:space-between;padding:20px 0;border-bottom:1px solid var(--ligne)}
  .brand{display:flex;flex-direction:column;line-height:1}
  .logo{font-family:'Fraunces',serif;font-weight:700;font-size:24px;background:linear-gradient(92deg,var(--safran),var(--brique));-webkit-background-clip:text;background-clip:text;color:transparent}
  .sig{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muet);margin-top:3px}
  .back{font-size:14px;color:var(--safran);text-decoration:none}
  .card{background:linear-gradient(180deg,var(--panel),var(--terre2));border:1px solid var(--ligne);border-radius:20px;padding:30px;margin-top:28px}
  .kind{display:inline-block;font-size:12px;letter-spacing:1px;text-transform:uppercase;border-radius:999px;padding:5px 13px;margin-bottom:14px}
  .kind.lieu{background:rgba(246,190,84,.15);color:var(--safran)}
  .kind.artiste{background:rgba(255,122,71,.16);color:var(--corail)}
  h1{font-family:'Fraunces',serif;font-weight:600;font-size:34px;line-height:1.1}
  .meta{color:var(--muet);font-size:14px;margin-top:8px}
  .tagrow{display:flex;flex-wrap:wrap;gap:7px;margin-top:16px}
  .tg{font-size:12.5px;padding:4px 11px;border-radius:999px;background:rgba(255,233,210,.08)}
  .desc{font-size:16px;line-height:1.65;color:#EAD9C5;margin-top:20px;white-space:pre-wrap}
  .video{margin-top:22px;border-radius:14px;overflow:hidden;border:1px solid var(--ligne);aspect-ratio:16/9}
  .video iframe{width:100%;height:100%;border:0;display:block}
  .field{margin-top:18px;padding-top:16px;border-top:1px solid var(--ligne)}
  .field .l{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muet);margin-bottom:5px}
  .field .v{font-size:15.5px}
  h2{font-family:'Fraunces',serif;font-weight:600;font-size:20px;margin:30px 0 4px}
  .appel{border:1px solid var(--ligne);border-radius:13px;padding:15px;margin-top:11px}
  .appel b{font-family:'Fraunces',serif;font-size:16px}
  .appel .m{font-size:12.5px;color:var(--muet);margin-top:4px}
  .cta{display:inline-block;margin-top:24px;background:linear-gradient(92deg,var(--brique),var(--safran));color:#2a1206;border-radius:12px;padding:13px 24px;font-size:15px;font-weight:600;text-decoration:none}
  .ghost{border-top:1px solid var(--ligne);margin-top:6px}
  .loading,.notfound{padding:50px 0;text-align:center;color:var(--muet)}
  footer{border-top:1px solid var(--ligne);margin-top:34px;padding:24px 0;text-align:center;color:var(--muet);font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <a href="decouvrir.html" style="display:flex;flex-direction:column;line-height:1;text-decoration:none">
      <span class="logo">Sén Péi</span><span class="sig">un Monde Pixie</span>
    </a>
    <a class="back" href="decouvrir.html">← Découvrir</a>
  </header>
  <div id="content"><div class="loading">Chargement…</div></div>
  <footer>Sén Péi — un Monde Pixie · La Réunion</footer>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
const sb=createClient('https://acxfzftptzgdhaakldve.supabase.co','sb_publishable_7bsk8ewqRUebVTqLrqbiaQ_UX78uMfr')
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))
const p=new URLSearchParams(location.search)
const type=p.get('type'), id=p.get('id')
const C=document.getElementById('content')

function embed(url){
  if(!url)return null
  const y=url.match(/(?:youtube\.com\/.*[?&]v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([\w-]{11})/)
  if(y)return 'https://www.youtube.com/embed/'+y[1]
  const v=url.match(/vimeo\.com\/(?:video\/)?(\d+)/)
  if(v)return 'https://player.vimeo.com/video/'+v[1]
  return null
}
function notfound(){C.innerHTML='<div class="notfound">Fiche introuvable. <a href="decouvrir.html" style="color:var(--safran)">Retour à Découvrir →</a></div>'}

;(async()=>{
  if(!id||(type!=='lieu'&&type!=='artiste'))return notfound()
  const table=type==='lieu'?'scene_lieux':'scene_artistes'
  const {data}=await sb.from(table).select('*').eq('id',id).maybeSingle()
  if(!data)return notfound()
  document.title='Sén Péi — '+(data.nom||'fiche')

  if(type==='lieu'){
    const {data:ap}=await sb.from('scene_besoins').select('*').eq('lieu_id',id).eq('statut','ouvert').order('created_at',{ascending:false})
    const appels=(ap||[]).map(b=>`<div class="appel"><b>${esc(b.titre)}</b><div class="m">${[b.discipline,b.periode,b.date_limite?('limite '+b.date_limite):null].filter(Boolean).map(esc).join(' · ')}</div>${b.description?`<div class="desc" style="margin-top:8px;font-size:14px">${esc(b.description)}</div>`:''}</div>`).join('')
    C.innerHTML=`<div class="card">
      <span class="kind lieu">Lieu</span>
      <h1>${esc(data.nom)}</h1>
      <div class="meta">${[data.type_lieu,data.commune,data.zone,data.jauge?('jauge '+data.jauge):null].filter(Boolean).map(esc).join(' · ')}</div>
      <div class="tagrow">${(data.disciplines||[]).map(d=>`<span class="tg">${esc(d)}</span>`).join('')}</div>
      ${data.description?`<div class="desc">${esc(data.description)}</div>`:''}
      ${data.contact?`<div class="field"><div class="l">Contact</div><div class="v">${esc(data.contact)}</div></div>`:''}
      ${data.site_web?`<div class="field"><div class="l">Site web</div><div class="v"><a href="${esc(data.site_web)}" target="_blank" rel="noopener" style="color:var(--safran)">${esc(data.site_web)}</a></div></div>`:''}
    </div>
    ${appels?`<h2>Ses appels à candidature</h2>${appels}<a class="cta" href="app.html">Candidater (connecte-toi) →</a>`:''}`
  }else{
    const emb=embed(data.video_url)
    C.innerHTML=`<div class="card">
      <span class="kind artiste">Artiste</span>
      <h1>${esc(data.nom)}</h1>
      <div class="meta">${[data.zone,data.tarif_indicatif].filter(Boolean).map(esc).join(' · ')}</div>
      <div class="tagrow">${(data.disciplines||[]).map(d=>`<span class="tg">${esc(d)}</span>`).join('')}</div>
      ${emb?`<div class="video"><iframe src="${emb}" allowfullscreen loading="lazy"></iframe></div>`
        :(data.video_url?`<div class="field"><div class="l">Vidéo</div><div class="v"><a href="${esc(data.video_url)}" target="_blank" rel="noopener" style="color:var(--corail)">▶ ${esc(data.video_url)}</a></div></div>`:'')}
      ${data.bio?`<div class="desc">${esc(data.bio)}</div>`:''}
      ${data.references_jouees?`<div class="field"><div class="l">Déjà joué à</div><div class="v">${esc(data.references_jouees)}</div></div>`:''}
      ${data.dispo?`<div class="field"><div class="l">Disponibilités</div><div class="v">${esc(data.dispo)}</div></div>`:''}
    </div>
    <a class="cta" href="app.html">Tu cherches un artiste ? Rejoins Sén Péi →</a>`
  }
})()
</script>
</body>
</html>
